name: Node.js CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Create Test Environment File
        run: |
          echo "PORT=5000" >> .env
          echo "ENVIRONMENT=development" >> .env
          echo "DB_HOST=tramway.proxy.rlwy.net" >> .env
          echo "DB_NAME=railway" >> .env
          echo "DB_PORT=49971" >> .env
          echo "DB_USER=root" >> .env
          echo "DB_PASS=rmlINAXBLkUowHulRaIcEySrwSaMJNJp" >> .env

      - name: Run Tests
        run: npm test
